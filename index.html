<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <title>Canvas 在线表格编辑器 - Tile Rendering</title>
    <style>
        :root {
            --sheet-bg: #ffffff;
            --sheet-text: #222;
            --sheet-border: #ddd;
            --sheet-header-bg: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: #fafafa;
        }

        #toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #f5f5f5;
            border-bottom: 1px solid #ccc;
            align-items: center;
            flex-wrap: wrap;
        }

        #toolbar button {
            padding: 5px 14px;
            cursor: pointer;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #fff;
            font-size: 13px;
            transition: background .15s;
        }

        #toolbar button:hover {
            background: #e8f4fd;
        }

        #toolbar .separator {
            width: 1px;
            height: 20px;
            background: #ccc;
        }

        #toolbar .info {
            font-size: 12px;
            color: #666;
            margin-left: 8px;
        }

        #wrap {
            width: 90vw;
            height: 80vh;
            border: 1px solid #bbb;
            margin: 20px auto;
            background: var(--sheet-bg);
            position: relative;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<div id="toolbar">
    <button onclick="wb.copy()">复制</button>
    <button onclick="wb.paste()">粘贴</button>
    <span class="separator"></span>
    <button onclick="wb.undo()">撤销</button>
    <button onclick="wb.redo()">重做</button>
    <span class="separator"></span>
    <button onclick="wb.disableCell()">禁用</button>
    <button onclick="wb.enableCell()">启用</button>
    <span class="separator"></span>
    <select id="font-family-select" onchange="applyFontFamily(this.value)"
            style="padding:4px 8px;border:1px solid #bbb;border-radius:4px;font-size:13px;width:120px;">
        <option value="Segoe UI">Segoe UI</option>
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Verdana">Verdana</option>
        <option value="Microsoft YaHei">微软雅黑</option>
        <option value="SimSun">宋体</option>
        <option value="KaiTi">楷体</option>
    </select>
    <select id="font-size-select" onchange="applyFontSize(this.value)"
            style="padding:4px 8px;border:1px solid #bbb;border-radius:4px;font-size:13px;width:70px;">
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12" selected>12</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="20">20</option>
        <option value="24">24</option>
        <option value="28">28</option>
        <option value="36">36</option>
        <option value="48">48</option>
        <option value="72">72</option>
    </select>
    <button onclick="toggleBold()" title="加粗 Ctrl+B" style="font-weight:bold;">B</button>
    <button onclick="toggleItalic()" title="斜体 Ctrl+I" style="font-style:italic;">I</button>
    <button onclick="toggleUnderline()" title="下划线 Ctrl+U" style="text-decoration:underline;">U</button>
    <span class="separator"></span>

    <!-- 导出格式选择 -->
    <select id="export-format" style="padding:4px 8px;border:1px solid #bbb;border-radius:4px;font-size:13px;">
        <option value="csv">CSV 格式</option>
        <option value="tsv">TSV 格式</option>
        <option value="xlsx" selected>XLSX 格式</option>
    </select>

    <button onclick="ExportManager.exportCurrent()">导出文件</button>

    <select id="export-preset" style="padding:4px 8px;border:1px solid #bbb;border-radius:4px;font-size:13px;">
        <option value="">快速模板</option>
        <option value="simple">简单表格</option>
        <option value="nested">嵌套表头</option>
        <option value="styled">带样式导出</option>
    </select>

    <button onclick="ExportManager.applyPreset()">应用模板并导出</button>
    <span class="separator"></span>
    <button onclick="hideCol()">隐藏列</button>
    <button onclick="showCol()">显示列</button>
    <button onclick="showAllCols()">显示所有列</button>
    <span class="info" id="hidden-col-info"></span>
    <span class="separator"></span>
    <button onclick="loadMillionData()">加载百万数据</button>
    <span class="separator"></span>
    <span class="info" id="status-info">就绪</span>
</div>

<div id="wrap">
    <canvas id="grid"></canvas>
</div>

<script>
    function loadMillionData() {
        const info = document.getElementById('status-info');
        info.textContent = '加载中...';
        const start = performance.now();

        const sheet = wb.getActiveSheet();
        const ROWS = 100000;
        const COLS = 26;

        sheet.rowColManager.ensureSize(ROWS, COLS);

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c === 0) {
                    sheet.setCell(r, c, `行${r + 1}`);
                } else if (c === 1) {
                    sheet.setCell(r, c, Math.floor(Math.random() * 10000));
                } else if (c === 2) {
                    const cities = ['北京', '上海', '广州', '深圳', '杭州', '成都', '武汉', '南京', '西安', '重庆'];
                    sheet.setCell(r, c, cities[r % cities.length]);
                }
            }
        }

        const elapsed = (performance.now() - start).toFixed(0);
        info.textContent = `已加载 ${ROWS.toLocaleString()} 行 × ${COLS} 列 (${elapsed}ms)`;
        wb.render();
    }

    /**
     * 导出管理器 - 统一管理所有导出功能
     */
    const ExportManager = {
        /**
         * 显示状态信息
         */
        showStatus(message) {
            const info = document.getElementById('status-info');
            if (info) info.textContent = message;
        },

        /**
         * 获取当前选择的导出格式
         */
        getFormat() {
            return document.getElementById('export-format').value || 'xlsx';
        },

        /**
         * 导出当前表格数据
         */
        async exportCurrent() {
            const format = this.getFormat();
            await this.doExport(format, {filename: 'data'});
        },

        /**
         * 执行导出操作（统一错误处理和计时）
         */
        async doExport(format, options = {}) {
            this.showStatus(`正在导出 ${format.toUpperCase()}...`);
            const start = performance.now();

            try {
                await wb.downloadFile(format, options);

                const elapsed = (performance.now() - start).toFixed(0);
                this.showStatus(`${format.toUpperCase()} 导出完成 (${elapsed}ms)`);
            } catch (error) {
                console.error('导出失败:', error);
                this.showStatus(`导出失败: ${error.message}`);
            }
        },

        /**
         * 应用预设模板并导出
         */
        async applyPreset() {
            const preset = document.getElementById('export-preset').value;
            if (!preset) {
                this.showStatus('请选择一个模板');
                return;
            }

            switch (preset) {
                case 'simple':
                    TestDataHelper.setupSimpleData();
                    break;
                case 'nested':
                    TestDataHelper.setupNestedHeadersData();
                    break;
                case 'styled':
                    TestDataHelper.setupStyledData();
                    break;
                default:
                    return;
            }

            setTimeout(() => {
                this.exportCurrent();
            }, 300);
        }
    };

    /**
     * 测试数据辅助工具
     */
    const TestDataHelper = {
        /**
         * 设置简单表格数据（2行3列）
         */
        setupSimpleData() {
            const sheet = wb.getActiveSheet();
            sheet.nestedHeaders = null;
            sheet.colHeaders = ['A', 'B', 'C'];

            sheet.setCell(0, 0, 1);
            sheet.setCell(0, 1, 2);
            sheet.setCell(1, 0, 2);
            sheet.setCell(1, 1, 2);

            ExportManager.showStatus('已加载简单表格数据');
            wb.render();
        },

        /**
         * 设置嵌套表头数据（模拟运行日报表）
         */
        setupNestedHeadersData() {
            wb.downloadFile('xlsx', {filename: 'nested-headers', nestedHeaders: true});
        },

        /**
         * 设置带样式的示例数据
         */
        setupStyledData() {
            wb.downloadFile('xlsx', {filename: 'nested-headers', nestedHeaders: true, cellStyles: true});
        },

    };

    function getHiddenColumns() {
        return wb.getPlugin('hiddenColumns');
    }

    function updateHiddenColInfo() {
        const hc = getHiddenColumns();
        if (!hc) return;
        const hidden = hc.getHiddenColumns();
        const info = document.getElementById('hidden-col-info');
        if (hidden.length === 0) {
            info.textContent = '';
        } else {
            const labels = hidden.map(c => wb.getActiveSheet().getColHeader(c));
            info.textContent = `已隐藏: ${labels.join(', ')}`;
        }
    }

    function hideCol() {
        const hc = getHiddenColumns();
        if (!hc) return;
        const [, col] = wb.getActiveSheet().selection.getActive();
        hc.hideColumn(col);
        updateHiddenColInfo();
    }

    function showCol() {
        const hc = getHiddenColumns();
        if (!hc) return;
        const [, col] = wb.getActiveSheet().selection.getActive();
        hc.showColumn(col);
        updateHiddenColInfo();
    }

    function showAllCols() {
        const hc = getHiddenColumns();
        if (!hc) return;
        const hidden = hc.getHiddenColumns();
        if (hidden.length > 0) {
            hc.showColumns(hidden);
        }
        updateHiddenColInfo();
    }

    function applyFontSize(size) {
        const sheet = wb.getActiveSheet();
        if (!sheet) return;
        const range = sheet.selection.getRange();
        sheet.setRangeStyle(range, {fontSize: parseInt(size)});
        wb.render();
        updateToolbarStyleState();
    }

    function applyFontFamily(family) {
        const sheet = wb.getActiveSheet();
        if (!sheet) return;
        const range = sheet.selection.getRange();
        sheet.setRangeStyle(range, {fontFamily: family});
        wb.render();
        updateToolbarStyleState();
    }

    function toggleBold() {
        const sheet = wb.getActiveSheet();
        if (!sheet) return;
        const range = sheet.selection.getRange();
        const [r, c] = sheet.selection.getActive();
        const currentStyle = sheet.resolveStyle(r, c);
        const newWeight = currentStyle.fontWeight === "bold" ? "normal" : "bold";
        sheet.setRangeStyle(range, {fontWeight: newWeight});
        wb.render();
        updateToolbarStyleState();
    }

    function toggleItalic() {
        const sheet = wb.getActiveSheet();
        if (!sheet) return;
        const range = sheet.selection.getRange();
        const [r, c] = sheet.selection.getActive();
        const currentStyle = sheet.resolveStyle(r, c);
        const newStyle = currentStyle.fontStyle === "italic" ? "normal" : "italic";
        sheet.setRangeStyle(range, {fontStyle: newStyle});
        wb.render();
        updateToolbarStyleState();
    }

    function toggleUnderline() {
        const sheet = wb.getActiveSheet();
        if (!sheet) return;
        const range = sheet.selection.getRange();
        const [r, c] = sheet.selection.getActive();
        const currentStyle = sheet.resolveStyle(r, c);
        const newDecoration = currentStyle.textDecoration === "underline" ? "none" : "underline";
        sheet.setRangeStyle(range, {textDecoration: newDecoration});
        wb.render();
        updateToolbarStyleState();
    }

    function updateToolbarStyleState() {
        const sheet = wb.getActiveSheet();
        if (!sheet) return;
        const [r, c] = sheet.selection.getActive();
        const style = sheet.resolveStyle(r, c);

        const fontSizeSelect = document.getElementById('font-size-select');
        const fontFamilySelect = document.getElementById('font-family-select');

        const currentSize = style.fontSize || 12;
        const sizeOption = fontSizeSelect.querySelector(`option[value="${currentSize}"]`);
        if (sizeOption) {
            fontSizeSelect.value = currentSize;
        } else {
            fontSizeSelect.value = "12";
        }

        const currentFamily = style.fontFamily || "Segoe UI";
        const familyOption = fontFamilySelect.querySelector(`option[value="${currentFamily}"]`);
        if (familyOption) {
            fontFamilySelect.value = currentFamily;
        } else {
            fontFamilySelect.value = "Segoe UI";
        }
    }

    window.updateToolbarStyleState = updateToolbarStyleState;
</script>

</body>
</html>
