<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 ExportFilePlugin 功能演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 30px;
        }

        .canvas-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e9ecef;
            min-height: 500px;
        }

        #spreadsheet {
            width: 100%;
            height: 450px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: white;
        }

        .control-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            border: 2px solid #e9ecef;
            height: fit-content;
        }

        .panel-title {
            font-size: 1.3em;
            color: #495057;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            font-weight: 600;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }

        .control-group select,
        .control-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-group select:focus,
        .control-group input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: white;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            transition: all 0.2s ease;
        }

        .checkbox-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }

        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }

        .log-panel {
            grid-column: 1 / -1;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #333;
        }

        .log-title {
            color: #4facfe;
            font-size: 1.2em;
            margin-bottom: 15px;
            font-family: monospace;
            font-weight: 600;
        }

        .log-content {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #d4d4d4;
        }

        .log-entry {
            padding: 6px 10px;
            margin: 4px 0;
            border-radius: 4px;
            border-left: 4px solid transparent;
        }

        .log-success {
            background: rgba(56, 239, 125, 0.1);
            border-left-color: #38ef7d;
            color: #38ef7d;
        }

        .log-error {
            background: rgba(255, 107, 107, 0.1);
            border-left-color: #ff6b6b;
            color: #ff6b6b;
        }

        .log-info {
            background: rgba(79, 172, 254, 0.1);
            border-left-color: #4facfe;
            color: #4facfe;
        }

        .log-warn {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #ffc107;
            color: #ffc107;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
            font-size: 14px;
            color: #6c757d;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }

        .icon {
            font-size: 1.2em;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📤 ExportFilePlugin 功能演示</h1>
            <p>支持 CSV / TSV / XLSX 格式导出，完整样式保留</p>
        </div>

        <div class="main-content">
            <div class="canvas-container">
                <h3 style="margin-bottom: 15px; color: #495057;">📊 电子表格预览</h3>
                <canvas id="spreadsheet"></canvas>
            </div>

            <div class="control-panel">
                <h3 class="panel-title">⚙️ 导出配置</h3>

                <div class="control-group">
                    <label for="formatSelect">📁 导出格式</label>
                    <select id="formatSelect">
                        <option value="csv">CSV (逗号分隔)</option>
                        <option value="tsv">TSV (制表符分隔)</option>
                        <option value="xlsx" selected>XLSX (Excel 原生格式)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="filenameInput">📝 文件名</label>
                    <input type="text" id="filenameInput" value="export-demo" placeholder="输入文件名...">
                </div>

                <div class="control-group">
                    <label>✅ 导出选项</label>
                    <div class="checkbox-group">
<!--                        <div class="checkbox-item">-->
<!--                            <input type="checkbox" id="simpleHeaders">-->
<!--                            <label for="simpleHeaders">简单表头（XLSX）</label>-->
<!--                        </div>-->
                        <div class="checkbox-item">
                            <input type="checkbox" id="nestedHeaders">
                            <label for="nestedHeaders">嵌套表头（XLSX）</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="cellStyles" checked>
                            <label for="cellStyles">导出样式（XLSX）</label>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="testDownload()">
                    <span class="icon">⬇️</span>
                    直接下载文件
                </button>

                <button class="btn btn-secondary" onclick="testExportAsBlob()">
                    <span class="icon">📦</span>
                    导出为 Blob
                </button>

                <button class="btn btn-info" onclick="testExportAsString()">
                    <span class="icon">📄</span>
                    导出为字符串
                </button>
            </div>

            <div class="log-panel">
                <h3 class="log-title">📋 操作日志</h3>
                <div class="log-content" id="logContent">
                    <div class="log-entry log-info">[系统] 页面加载完成，等待初始化...</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>系统就绪</span>
            </div>
            <div>
                CanvasSheet v2.1.0 | ExportFilePlugin Demo
            </div>
        </div>
    </div>

    <!-- 引入依赖 -->
    <script src="./libs/exceljs.min.js"></script>
    <script src="../dist/canvas-sheet.umd.js"></script>

    <script>
        let workbook = null;
        let exportPlugin = null;

        function log(message, type = 'info') {
            const logContent = document.getElementById('logContent');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        async function initSpreadsheet() {
            try {
                log('开始初始化 Workbook...', 'info');

                const container = document.getElementById('spreadsheet');
                workbook = new CanvasSheet.Workbook(container,{
                    width: 900,
                    height: 530,
                    plugins: [
                        "autoFill",
                        "contextMenu",
                        "columnMove",
                        "copyPaste",
                        "exportFile",
                        "importFile",
                        "hiddenColumns",
                        "hiddenRows",
                        "rowMove",
                        "freeze",
                        "formula",
                        "sort",
                        "dataValidation",
                    ],
                    sheets: [{
                        name: "Sheet2",

                        // readOnly: false,
                        data: [
                            ["Zhang San", 25, "Beijing", "Tech", 15000, "2020-03-15"],
                            ["Li Si", 30, "Shanghai", "Marketing", 18000, "2019-07-01"],
                            ["Wang Wu", 28, "Guangzhou", "Tech", 16000, "2021-01-10"],
                        ],

                        // colHeaders: ["Name", "Age", "City", "Dept", "Salary", "Hire Date"],
                        rowHeaderWidth: 120,
                        rowHeights: [30, 50, 90],
                        rowHeaders: [{ label: "序号", style: { textAlign: "center" } }, "年龄", "城市", "部门", "薪酬", "入职日期"],

                        // 嵌套表头配置（支持完整 style 属性）
                        nestedHeaders: [
                            [
                                {
                                    label: "基本信息",
                                    colspan: 2,
                                    style: {
                                        backgroundColor: "#FFC000",
                                        color: "#FFFFFF",
                                        fontWeight: "bold",
                                        fontSize: "14px",
                                        textAlign: "left",
                                    },
                                },
                                {
                                    label: "工作信息",
                                    colspan: 4,
                                    style: {
                                        backgroundColor: "#70AD47",
                                        color: "#FFFFFF",
                                        fontWeight: "bold",
                                        fontSize: "14px",
                                        textAlign: "center",
                                    },
                                },
                            ],
                            [
                                {
                                    label: "姓名",
                                    style: {
                                        backgroundColor: "#FFC000",
                                        fontWeight: "bold",
                                    },
                                },
                                "年龄",
                                {
                                    label: "城市",
                                    style: {
                                        backgroundColor: "#FFC000",
                                        fontWeight: "bold",
                                    },
                                },
                                {
                                    label: "部门",
                                    style: {
                                        fontStyle: "italic",
                                        color: "#333333",
                                    },
                                },
                                {
                                    label: "薪酬",
                                    colspan: 2,
                                    style: {
                                        backgroundColor: "#ED7D31",
                                        color: "#FFFFFF",
                                        textAlign: "center",
                                    },
                                },
                            ],
                            ["Name", "Age", "City", "Dept", "Salary", "Hire Date"],
                        ],
                        textOverflowEllipsis: false,
                        cellPadding: 10,
                        conditionalStyles: [
                            {
                                range: { topRow: 0, topCol: 0, bottomRow: 10000000, bottomCol: 25 },
                                condition: (v) => CanvasSheet.isNumber(v) && v > 25,
                                style: { backgroundColor: "#ffcccc" },
                            },
                        ],
                        cell: [
                            { row: 0, col: 0, style: { backgroundColor: "#e8f4fd", fontWeight: "bold", textAlign: "center" } },
                            { row: 1, col: 3, disabled: true },
                            { row: 2, col: 4, readOnly: true, style: { backgroundColor: "#fff3cd" } },
                        ],
                        cells: (row, col) => {
                            if (row === 0) {
                                return { style: { fontWeight: "bold", backgroundColor: "#e8f4fd" } };
                            }
                            if (col === 0 && row > 0) {
                                return { style: { textAlign: "right", fontWeight: "bold" } };
                            }
                        },
                        columns: [
                            { type: "text", width: 120, style: { textAlign: "left" } },
                            { type: "numeric", width: 80, style: { textAlign: "right" }, numericFormat: { pattern: "0" } },
                            { type: "text", width: 100 },
                            { type: "text", width: 100 },
                            { type: "numeric", width: 100, style: { textAlign: "right" }, numericFormat: { pattern: "$0,0.00" } },
                            { type: "date", width: 300 },
                        ],
                    }]});

                workbook.initRender();
                workbook.render();

                exportPlugin = workbook.getPlugin('exportFile');
                
                if (!exportPlugin) {
                    throw new Error('ExportFilePlugin 未找到');
                }

                log('✅ Workbook 初始化成功', 'success');
                log(`✅ ExportFilePlugin 已加载`, 'success');

            } catch (error) {
                log(`❌ 初始化失败: ${error.message}`, 'error');
                console.error(error);
            }
        }

        function getExportOptions() {
            return {
                filename: document.getElementById('filenameInput').value || 'export',
                nestedHeaders: document.getElementById('nestedHeaders').checked,
                // columnHeaders: document.getElementById('simpleHeaders').checked,
                cellStyles: document.getElementById('cellStyles').checked
            };
        }

        async function testDownload() {
            try {
                const format = document.getElementById('formatSelect').value;
                const options = getExportOptions();

                log(`🚀 开始下载 ${format.toUpperCase()} 文件...`, 'info');
                log(`   配置: ${JSON.stringify(options)}`, 'info');

                const startTime = performance.now();

                await exportPlugin.downloadFile(format, options);

                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);

                log(`✅ 下载成功! (${duration}ms)`, 'success');
                log(`📁 文件名: ${options.filename}.${format}`, 'info');

            } catch (error) {
                log(`❌ 下载失败: ${error.message}`, 'error');
                console.error(error);
            }
        }

        async function testExportAsBlob() {
            try {
                const format = document.getElementById('formatSelect').value;
                const options = getExportOptions();

                log(`📦 开始导出 Blob (${format.toUpperCase()})...`, 'info');

                const startTime = performance.now();
                const blob = await exportPlugin.exportAsBlob(format, options);
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);

                if (!blob) {
                    throw new Error('导出结果为空');
                }

                const sizeKB = (blob.size / 1024).toFixed(2);

                log(`✅ Blob 导出成功!`, 'success');
                log(`   大小: ${sizeKB} KB`, 'info');
                log(`   类型: ${blob.type}`, 'info');
                log(`   耗时: ${duration}ms`, 'info');

                if (confirm('是否保存 Blob 到本地？')) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${options.filename}.${format}`;
                    a.click();
                    URL.revokeObjectURL(url);
                    log('💾 Blob 已保存到本地', 'success');
                }

            } catch (error) {
                log(`❌ Blob 导出失败: ${error.message}`, 'error');
                console.error(error);
            }
        }

        function testExportAsString() {
            try {
                const format = document.getElementById('formatSelect').value;
                const options = getExportOptions();

                log(`📄 开始导出字符串 (${format.toUpperCase()})...`, 'info');

                const startTime = performance.now();
                const str = exportPlugin.exportAsString(format, options);
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);

                if (format === 'xlsx') {
                    log(`⚠️ exportAsString() 不支持 XLSX 格式，请使用 downloadFile() 或 exportAsBlob()`, 'warn');
                    return;
                }

                if (!str) {
                    throw new Error('导出结果为空');
                }

                const lines = str.split('\n').length;
                const chars = str.length;

                log(`✅ 字符串导出成功!`, 'success');
                log(`   行数: ${lines}`, 'info');
                log(`   字符数: ${chars}`, 'info');
                log(`   耗时: ${duration}ms`, 'info');

                log('\n--- 预览前 5 行 ---', 'info');
                const previewLines = str.split('\n').slice(0, 5);
                previewLines.forEach((line, index) => {
                    log(`${index + 1}: ${line}`, 'info');
                });

                if (lines > 5) {
                    log(`... 共 ${lines} 行`, 'info');
                }

                console.log('=== 完整导出内容 ===');
                console.log(str);

            } catch (error) {
                log(`❌ 字符串导出失败: ${error.message}`, 'error');
                console.error(error);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(initSpreadsheet, 500);
        });

        window.addEventListener('error', (event) => {
            log(`💥 全局错误: ${event.message}`, 'error');
        });
    </script>
</body>
</html>
