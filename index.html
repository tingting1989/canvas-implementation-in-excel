<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Canvas 在线表格编辑器 - Tile Rendering</title>
<style>
:root {
  --sheet-bg: #ffffff;
  --sheet-text: #222;
  --sheet-border: #ddd;
  --sheet-header-bg: #f0f0f0;
  --scrollbar-bg: #f1f1f1;
  --scrollbar-thumb: #c1c1c1;
  --scrollbar-thumb-hover: #a8a8a8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Segoe UI", sans-serif;
  background: #fafafa;
}

#toolbar {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: #f5f5f5;
  border-bottom: 1px solid #ccc;
  align-items: center;
  flex-wrap: wrap;
}

#toolbar button {
  padding: 5px 14px;
  cursor: pointer;
  border: 1px solid #bbb;
  border-radius: 4px;
  background: #fff;
  font-size: 13px;
  transition: background .15s;
}

#toolbar button:hover {
  background: #e8f4fd;
}

#toolbar .separator {
  width: 1px;
  height: 20px;
  background: #ccc;
}

#toolbar .info {
  font-size: 12px;
  color: #666;
  margin-left: 8px;
}

#wrap {
  width: 90vw;
  height: 80vh;
  overflow: hidden;
  border: 1px solid #bbb;
  margin: 20px auto;
  background: var(--sheet-bg);
  position: relative;
}

canvas {
  display: block;
}

.scrollbar-h {
  position: absolute;
  bottom: 0;
  left: 46px;
  right: 14px;
  height: 14px;
  background: var(--scrollbar-bg);
  border-top: 1px solid #ddd;
  z-index: 10;
}

.scrollbar-h-thumb {
  position: absolute;
  top: 1px;
  height: 12px;
  min-width: 30px;
  background: var(--scrollbar-thumb);
  border-radius: 6px;
  cursor: pointer;
}

.scrollbar-h-thumb:hover {
  background: var(--scrollbar-thumb-hover);
}

.scrollbar-v {
  position: absolute;
  top: 28px;
  right: 0;
  bottom: 14px;
  width: 14px;
  background: var(--scrollbar-bg);
  border-left: 1px solid #ddd;
  z-index: 10;
}

.scrollbar-v-thumb {
  position: absolute;
  left: 1px;
  width: 12px;
  min-height: 30px;
  background: var(--scrollbar-thumb);
  border-radius: 6px;
  cursor: pointer;
}

.scrollbar-v-thumb:hover {
  background: var(--scrollbar-thumb-hover);
}

.scrollbar-corner {
  position: absolute;
  right: 0;
  bottom: 0;
  width: 14px;
  height: 14px;
  background: var(--scrollbar-bg);
  border-top: 1px solid #ddd;
  border-left: 1px solid #ddd;
  z-index: 11;
}
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="wb.switchTo('Sheet1')">Sheet1</button>
  <button onclick="wb.switchTo('Sheet2')">Sheet2</button>
  <span class="separator"></span>
  <button onclick="wb.copy()">复制</button>
  <button onclick="wb.paste()">粘贴</button>
  <span class="separator"></span>
  <button onclick="wb.undo()">撤销</button>
  <button onclick="wb.redo()">重做</button>
  <span class="separator"></span>
  <button onclick="wb.disableCell()">禁用</button>
  <button onclick="wb.enableCell()">启用</button>
  <span class="separator"></span>
  <button onclick="loadMillionData()">加载百万数据</button>
  <span class="info" id="status-info">就绪</span>
</div>

<div id="wrap">
  <canvas id="grid"></canvas>
  <div class="scrollbar-h">
    <div class="scrollbar-h-thumb"></div>
  </div>
  <div class="scrollbar-v">
    <div class="scrollbar-v-thumb"></div>
  </div>
  <div class="scrollbar-corner"></div>
</div>

<script>
function loadMillionData() {
  const info = document.getElementById('status-info');
  info.textContent = '加载中...';
  const start = performance.now();

  const sheet = wb.getActiveSheet();
  const ROWS = 100000;
  const COLS = 26;

  sheet.rowColManager.ensureSize(ROWS, COLS);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c === 0) {
        sheet.setCell(r, c, `行${r + 1}`);
      } else if (c === 1) {
        sheet.setCell(r, c, Math.floor(Math.random() * 10000));
      } else if (c === 2) {
        const cities = ['北京','上海','广州','深圳','杭州','成都','武汉','南京','西安','重庆'];
        sheet.setCell(r, c, cities[r % cities.length]);
      }
    }
  }

  const elapsed = (performance.now() - start).toFixed(0);
  info.textContent = `已加载 ${ROWS.toLocaleString()} 行 × ${COLS} 列 (${elapsed}ms)`;
  wb.render();
}

(function initScrollbarDrag() {
  document.addEventListener('DOMContentLoaded', () => {
    const wrap = document.getElementById('wrap');
    const hThumb = wrap.querySelector('.scrollbar-h-thumb');
    const vThumb = wrap.querySelector('.scrollbar-v-thumb');

    let dragging = null;
    let startMouse = 0;
    let startScroll = 0;

    function onHThumbDown(e) {
      e.preventDefault();
      dragging = 'h';
      startMouse = e.clientX;
      startScroll = wb.renderEngine.scrollX;
      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);
    }

    function onVThumbDown(e) {
      e.preventDefault();
      dragging = 'v';
      startMouse = e.clientY;
      startScroll = wb.renderEngine.scrollY;
      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);
    }

    function onDragMove(e) {
      if (!wb.renderEngine) return;
      if (dragging === 'h') {
        const dx = e.clientX - startMouse;
        const trackW = wrap.clientWidth - 46 - 14;
        const maxScroll = wb.renderEngine.maxScrollX;
        const totalContent = maxScroll + wrap.clientWidth - 46;
        const ratio = totalContent > 0 ? trackW / totalContent : 1;
        const newX = Math.max(0, Math.min(maxScroll, startScroll + dx / ratio));
        wb.renderEngine.setScrollPosition(newX, wb.renderEngine.scrollY);
      } else if (dragging === 'v') {
        const dy = e.clientY - startMouse;
        const trackH = wrap.clientHeight - 28 - 14;
        const maxScroll = wb.renderEngine.maxScrollY;
        const totalContent = maxScroll + wrap.clientHeight - 28;
        const ratio = totalContent > 0 ? trackH / totalContent : 1;
        const newY = Math.max(0, Math.min(maxScroll, startScroll + dy / ratio));
        wb.renderEngine.setScrollPosition(wb.renderEngine.scrollX, newY);
      }
    }

    function onDragEnd() {
      dragging = null;
      document.removeEventListener('mousemove', onDragMove);
      document.removeEventListener('mouseup', onDragEnd);
    }

    hThumb.addEventListener('mousedown', onHThumbDown);
    vThumb.addEventListener('mousedown', onVThumbDown);
  });
})();
</script>

</body>
</html>
